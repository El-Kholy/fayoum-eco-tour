services:
  - type: web
    name: fayoum-eco-tours
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn fayoum.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "fayoum-eco-tours.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: fayoum-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: fayoum-db
    databaseName: fayoum_eco_db
    plan: free
