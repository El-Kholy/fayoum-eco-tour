{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fayoum Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- الربط الصح للـ CSS -->
  <link rel="stylesheet" href="{% static 'login.stylsheet.css' %}?v=10">
  <link rel="stylesheet" href="{% static 'responsive.css' %}" />
  <!-- الربط الصح للأيقونة -->
  <link rel="icon" type="image/png" href="{% static 'data/final.logo.png' %}">
</head>

<body>
  <header>
    <div class="logo">
      <!-- الربط الصح للوجو -->
      <img class="logo-img" src="{% static 'data/final.logo.png' %}" alt="logo">
    </div>


    <div class="lang">
      <button onclick="changeLang('ar')">AR</button>
      <button onclick="changeLang('en')">EN</button>
    </div>
  </header>
  


  <div class="login-box">
    <h2 id="title">اكتشف الفيوم</h2>
 
    <!-- تعديل الفورم عشان يبعت البيانات للباك آند -->
    <form method="POST">
      {% csrf_token %} <!-- ضروري جداً للأمان في ديجانجو -->
      <input id="email" name="email" type="email" placeholder="البريد الإلكتروني" required>
      <input id="password" name="password" type="password" placeholder="كلمة السر" required>

      {% if messages %}
              {% for message in messages %}
                  <div class="alert-box {{ message.tags }}">
                      <span class="icon">⚠️</span>
                      {{ message }}
                  </div>
              {% endfor %}
          {% endif %}

      <div class="options">
        <label>
          <input type="checkbox">
          <span id="remember">تذكرني</span>
        </label>
        <a href="#" id="forgot">هل نسيت كلمة السر؟</a>
      </div>

      <button type="submit" class="btn" id="loginBtn">تسجيل الدخول</button>
    </form>

    <p id="signupText">
      ليس لديك حساب؟
      <!-- الربط الصح لصفحة إنشاء حساب -->
      <a href="{% url 'signup' %}" id="signupLink">إنشاء حساب جديد</a>
    </p>
  </div>
  
  <!-- الربط الصح للجافا سكريبت -->
  <script src="{% static 'js_login.js' %}"></script>
</body>
</html>
